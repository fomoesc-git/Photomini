name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: macOS Apple Silicon
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri/target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (macOS arm64)
        run: npm run tauri build -- --target aarch64-apple-darwin --bundles app,dmg --ci --no-sign

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Photomini-macOS-arm64-DMG
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Photomini-macOS-arm64-App
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: Photomini-macOS-arm64-Standalone
          path: src-tauri/target/aarch64-apple-darwin/release/photomini

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri/target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Windows x64)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles msi,nsis --ci

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Photomini-Windows-x64-MSI
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Photomini-Windows-x64-Setup-Exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: Photomini-Windows-x64-Standalone-Exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
